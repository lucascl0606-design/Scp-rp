<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>SCP RP FR — Panel Modérateur</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #00ff88; --green-dim: #00cc66; --bg: #050a05; --bg2: #0a110a;
      --border: #1a3a1a; --text: #c8e6c8; --red: #ff3344;
      --mono: 'Share Tech Mono', monospace; --title: 'Rajdhani', sans-serif;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; overflow-x:hidden; }
    body { background:var(--bg); color:var(--text); font-family:var(--mono); min-height:100vh; }
    .scanlines { position:fixed; inset:0; pointer-events:none; z-index:100; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.012) 2px,rgba(0,255,136,0.012) 4px); }
    .grid-bg { position:fixed; inset:0; pointer-events:none; z-index:0; background-image:linear-gradient(rgba(0,255,136,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.025) 1px,transparent 1px); background-size:40px 40px; }

    .header {
      position:relative; z-index:10;
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px; border-bottom:1px solid #1a3a1a;
    }
    .header-logo { font-family:var(--title); font-size:16px; font-weight:700; letter-spacing:4px; color:var(--green-dim); }
    .header-badge { font-size:9px; letter-spacing:2px; color:#446644; margin-top:2px; }
    .btn-back { background:transparent; border:1px solid #1a3a1a; color:#446644; font-family:var(--mono); font-size:10px; letter-spacing:1px; padding:5px 10px; cursor:pointer; -webkit-appearance:none; border-radius:0; }
    .btn-back:hover { border-color:var(--green-dim); color:var(--green-dim); }

    .section { position:relative; z-index:10; padding:16px; }
    .section-title { font-size:9px; letter-spacing:3px; color:#446644; text-transform:uppercase; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #0d1f0d; }

    .member-card { background:var(--bg2); border:1px solid var(--border); padding:12px 14px; margin-bottom:8px; }
    .member-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
    .member-pseudo { font-family:var(--title); font-size:16px; color:var(--green); letter-spacing:1px; }
    .member-grade { font-size:9px; letter-spacing:2px; padding:2px 8px; border:1px solid #1a3a1a; color:#446644; }
    .member-date { font-size:9px; color:#2a4a2a; margin-bottom:8px; }

    .btn-delete {
      padding:6px 12px; font-family:var(--mono); font-size:9px; letter-spacing:1px;
      text-transform:uppercase; cursor:pointer; border:1px solid #3a1a1a;
      background:transparent; color:var(--red); -webkit-appearance:none; border-radius:0;
    }
    .btn-delete:hover { background:rgba(255,51,68,0.06); }

    .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--bg2); border:1px solid var(--green-dim); color:var(--green); font-family:var(--mono); font-size:11px; letter-spacing:1px; padding:10px 20px; z-index:300; opacity:0; transition:opacity 0.3s; white-space:nowrap; }
    .toast.show { opacity:1; }
    .empty { font-size:11px; color:#2a4a2a; text-align:center; padding:20px; letter-spacing:1px; }
    .footer { position:relative; z-index:10; padding:12px 16px; border-top:1px solid #0d1f0d; display:flex; justify-content:space-between; font-size:9px; color:#1a3a1a; letter-spacing:1px; margin-top:10px; }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="grid-bg"></div>
  <div class="toast" id="toast"></div>

  <div class="header">
    <div>
      <div class="header-logo">PANEL MODÉRATEUR</div>
      <div class="header-badge" id="mod-name">SCP RP FR</div>
    </div>
    <button class="btn-back" onclick="window.location.href='accueil.html'">← Retour</button>
  </div>

  <div class="section">
    <div class="section-title">Membres — Suppression uniquement</div>
    <div id="member-list"><div class="empty">Chargement...</div></div>
  </div>

  <div class="footer">
    <span>MODÉRATEUR</span>
    <span id="clock">--:--:--</span>
  </div>

  <script>
    const JSONBIN_API_KEY = "$2a$10$z37BcpPizhH149CbjRgPeu9GNDl9JUhPVSlVZmqnr3bPbUCBNRjHC";
    const BIN_ID = "69c61e82aa77b81da92483dc";
    const API = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    // Vérifier que l'utilisateur est bien admin
    const userData = localStorage.getItem('scp_user');
    if (!userData) { window.location.href = 'index.html'; }
    else {
      const user = JSON.parse(userData);
      if (user.grade !== 'Admin' && user.pseudo.toLowerCase() !== 'luluclc3') {
        window.location.href = 'accueil.html';
      }
      document.getElementById('mod-name').textContent = 'Modérateur : ' + user.pseudo;
    }

    async function getUsers() {
      const res = await fetch(API + "/latest", { headers: { "X-Access-Key": JSONBIN_API_KEY } });
      const data = await res.json();
      return data.record.users || [];
    }

    async function saveUsers(users) {
      await fetch(API, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Access-Key": JSONBIN_API_KEY },
        body: JSON.stringify({ users })
      });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function loadMembers() {
      const users = await getUsers();
      const list = document.getElementById('member-list');
      if (users.length === 0) { list.innerHTML = '<div class="empty">Aucun membre.</div>'; return; }
      list.innerHTML = users.map((u, i) => {
        const date = u.createdAt ? new Date(u.createdAt).toLocaleDateString('fr-FR') : '—';
        return `
          <div class="member-card" id="card-${i}">
            <div class="member-top">
              <span class="member-pseudo">${u.pseudo}</span>
              <span class="member-grade">${(u.grade || 'Membre').toUpperCase()}</span>
            </div>
            <div class="member-date">Inscrit le ${date}</div>
            <button class="btn-delete" onclick="deleteUser(${i})">🗑 Supprimer</button>
          </div>`;
      }).join('');
    }

    async function deleteUser(i) {
      const users = await getUsers();
      const pseudo = users[i].pseudo;
      users.splice(i, 1);
      await saveUsers(users);
      showToast(`🗑 ${pseudo} supprimé.`);
      loadMembers();
    }

    loadMembers();
    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR'); }, 1000);
  </script>
</body>
</html>
